server:
  port: ${JAVA_ORCHESTRATOR_PORT:8080}

spring:
  application:
    name: meichen-orchestrator
  datasource:
    url: jdbc:mysql://localhost:3306/meichen?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: meichen
    password: meichen123
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  flyway:
    enabled: true
    baseline-on-migrate: true
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    # 目前保留 update，避免已存在的开发环境数据库因 Flyway 初次接管而中断。
    # 后续稳定后建议切换为 validate，让 Flyway 单独负责 schema 变更。
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

agent-core:
  base-url: http://${AGENT_CORE_HOST:localhost}:${AGENT_CORE_PORT:8000}

app:
  data-dir: ${MEICHEN_DATA_DIR:/Users/liulei/private-work/design-agent/design-data}

logging:
  level:
    com.meichen.orchestrator: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration-days: 30
