server:
  port: ${JAVA_ORCHESTRATOR_PORT:8080}

spring:
  application:
    name: meichen-orchestrator
  datasource:
    url: jdbc:mysql://localhost:3306/meichen?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&characterEncoding=utf8
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: meichen
    password: meichen123
    hikari:
      maximum-pool-size: 25
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

agent-core:
  base-url: http://${AGENT_CORE_HOST:localhost}:${AGENT_CORE_PORT:8000}

app:
  data-dir: ${MEICHEN_DATA_DIR:/Users/liulei/private-work/design-data}

logging:
  level:
    com.meichen.orchestrator: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/agent-api.log
