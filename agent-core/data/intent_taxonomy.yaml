  - name: "现代简约"
    aliases: ["简约", "modern minimal"]
  - name: "国潮"
    aliases: ["中国风", "新中式", "chinese trend"]
  - name: "轻奢"
    aliases: ["轻奢华", " affordable luxury"]
  - name: "海洋风"
    aliases: ["海洋主题", "summer ocean"]
  - name: "新春"
    aliases: ["春节", "新年", "spring festival"]

materials:
  - name: "亚克力"
    aliases: ["acrylic"]
  - name: "LED灯带"
    aliases: ["灯带", "led strip"]
  - name: "金属框架"
    aliases: ["金属", "metal frame"]
