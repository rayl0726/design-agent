    aliases: ["glass"]
  - name: "木材"
    aliases: ["木质", "wood"]
  - name: "泡沫雕塑"
    aliases: ["泡沫", "foam sculpture"]

field_defaults:
  space_type:
    required: true
    can_inherit: false
  budget:
    required: true
    can_inherit: false
  points:
    required: false
    can_inherit: false
    default_by_space_type:
      快闪店: ["门头", "DP点", "合影墙"]
      购物中心中庭: ["中庭", "DP点"]
      百货入口: ["门头", "指示牌"]
      步行街: ["DP点", "指示牌", "花车"]
  style:
    required: false
    can_inherit: true
  color_preference:
    required: false
    can_inherit: true
  material_restrictions:
    required: false
    can_inherit: true
  timeline:
    required: false
    can_inherit: false
    default_value: "2-3周"
